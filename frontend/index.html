<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auth UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  width: 850px;
  height: 550px;
  background: white;
  display: flex;
  border-radius: 12px;
}
.left {
  width: 50%;
  background: #667eea;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
}
.right {
  width: 50%;
  padding: 40px;
}
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}
button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #667eea;
  color: white;
  border: none;
}
.hidden { display: none; }
</style>
</head>

<body>

<div class="container">

<div class="left">
<h1 id="leftTitle">Welcome Back!</h1>
</div>

<div class="right">

<h2 id="formTitle">Login</h2>

<input id="first_name" class="hidden" placeholder="First Name">
<input id="last_name" class="hidden" placeholder="Last Name">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="submitForm()">Submit</button>

<div onclick="toggleMode()" style="cursor:pointer;">
Switch Mode
</div>

<div id="g_id_onload"
 data-client_id="766510130964-vpvfpfgs2cbn13qhtft6r3orvpnrrds2.apps.googleusercontent.com"
 data-callback="handleGoogle">
</div>

<div class="g_id_signin"></div>

</div>
</div>

<script>

let isLogin = true;

// -----------------------------
function toggleMode() {
  isLogin = !isLogin;

  document.getElementById("formTitle").innerText = isLogin ? "Login" : "Signup";

  document.getElementById("first_name").classList.toggle("hidden", isLogin);
  document.getElementById("last_name").classList.toggle("hidden", isLogin);
}

// -----------------------------
async function submitForm() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const first_name = document.getElementById("first_name").value;
  const last_name = document.getElementById("last_name").value;

  const url = isLogin
    ? "http://127.0.0.1:8000/auth/login"
    : "http://127.0.0.1:8000/auth/signup";

  const body = isLogin
    ? { email, password }
    : { email, password, first_name, last_name };

  const res = await fetch(url, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  });

  const data = await res.json();
  console.log(" LOGIN RESPONSE:", data);

  if (!res.ok) {
    alert(data.detail || "Error");
    return;
  }

  const token = data.access_token || data.token;

  if (token) {
    localStorage.setItem("access_token", token);
    console.log("TOKEN SAVED:", token);
  }
  alert("Success 🎉");

  setTimeout(() => {
    window.location.href = "chat.html";
  }, 200);
}

// -----------------------------
async function handleGoogle(response) {

  const res = await fetch("http://127.0.0.1:8000/auth/google", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ token: response.credential })
  });

  const data = await res.json();

  console.log("GOOGLE RESPONSE:", data);
  const token = data.access_token || data.token || data.accessToken;

  if (token) {
      localStorage.setItem("access_token", token);

      setTimeout(() => {
          window.location.href = "chat.html";
      }, 200);

  } else {
      alert("Google login failed");
  }
}

</script>

</body>
</html>
